name: Import Category

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL de categoría Atacado (ej: https://atacadoconnect.com/categoria/beleza)'
        required: true
        type: string
      cat:
        description: 'Categoría del catálogo'
        required: true
        type: choice
        options:
          - Belleza
          - Audio
          - Celulares
          - Accesorios
          - Computación
          - Hogar y Cocina
          - Consolas
          - Smart TV - Proyectores
      calc_sub:
        description: 'calcSub para cálculo de precio (ej: cera, unico, slim...)'
        required: true
        type: string
      badge:
        description: 'Badge del producto'
        required: false
        default: 'a pedido'
        type: string
      badge_color:
        description: 'Color del badge (hex)'
        required: false
        default: '#FF9500'
        type: string
  schedule:
    - cron: '0 11 * * 1-5'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  import-and-enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Modo manual: un solo import con los inputs del dispatch
      - name: Import category (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          python scripts/import_category.py \
            --url "${{ inputs.url }}" \
            --cat "${{ inputs.cat }}" \
            --calc-sub "${{ inputs.calc_sub }}" \
            --badge "${{ inputs.badge }}" \
            --badge-color "${{ inputs.badge_color }}"

      # Modo cron: itera todas las entradas de import-schedules.json
      - name: Import categories (scheduled)
        if: github.event_name == 'schedule'
        run: |
          python - <<'EOF'
          import json, subprocess, sys
          schedules = json.load(open("data/import-schedules.json"))
          for s in schedules:
              cmd = [
                  sys.executable, "scripts/import_category.py",
                  "--url", s["url"],
                  "--cat", s["cat"],
                  "--calc-sub", s["calc_sub"],
                  "--badge", s.get("badge", "a pedido"),
                  "--badge-color", s.get("badge_color", "#FF9500"),
              ]
              print(f"\n--- Importing: {s['cat']} from {s['url']} ---")
              subprocess.run(cmd, check=True)
          EOF

      - name: Commit imported products
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/productos.json
          git diff --staged --quiet || (git commit -m "bot: import category products" && git pull --rebase && git push)

      - name: Check pending count
        id: check
        run: |
          COUNT=$(python -c "import json; d=json.load(open('data/productos.json')); print(sum(1 for p in d['products'] if p.get('status')=='pending'))")
          echo "pending=$COUNT" >> $GITHUB_OUTPUT

      - name: Enrich products
        if: steps.check.outputs.pending != '0'
        run: python scripts/enrich_products.py

      - name: Commit enriched products
        if: steps.check.outputs.pending != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ images/
          git diff --staged --quiet || (git commit -m "bot: enrich after category import" && git pull --rebase && git push)
